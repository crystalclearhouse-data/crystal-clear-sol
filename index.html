    <!-- Single Page App redirect decode for GitHub Pages -->
    <script>
      (function (l) {
        if (l.search.startsWith("?p=")) {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?")
            .slice(2)
            .replace(/\?/, "&");
          var base = l.pathname.endsWith("/")
            ? l.pathname.slice(0, -1)
            : l.pathname;
          window.history.replaceState(
            null,
            null,
            base +
              (decoded.charAt(0) === "/" ? "" : "/") +
              decoded +
              l.hash
          );
        }
      })(window.location);
    </script>
